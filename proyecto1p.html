<td>
BUHO
</td>
<td>
  Un búho es un ave rapaz nocturna, conocida por sus grandes ojos frontales, cabeza redonda (a menudo con mechones tipo "orejas"), y vuelo silencioso, que caza principalmente de noche usando su excelente vista y oído para atrapar pequeños animales; existen más de 220 especies distribuidas globalmente, excepto en la Antártida, siendo importantes controladores de plagas en sus ecosistemas. 
</td>

<td>
LINCE
</td>
<td>
  También conocido popularmente como gato montés, gato rabón o bobcat, un felino salvaje solitario y carnívoro, de tamaño mediano, caracterizado por su cola corta y mechones de pelo en las orejas, que habita gran parte del territorio mexicano y se alimenta de pequeños mamíferos

<td>
  MEDUSAS
</td>
<td>
Una medusa es un animal marino invertebrado, del grupo de los cnidarios, con cuerpo gelatinoso en forma de campana o sombrilla y tentáculos urticantes que usa para defenderse y atrapar presas, compuesta principalmente de agua y que se mueve a la deriva, aunque puede propulsarse ligeramente. Pueden ser transparentes o de colores vivos, desde muy pequeñas hasta gigantescas, y son cruciales en los ecosistemas marinos, aunque sus picaduras pueden ser peligrosas para humanos

<td>
ELEFANTE 
</td>
<td>
  Un elefante es el mamífero terrestre más grande del mundo, conocido por su trompa larga y flexible, orejas grandes y colmillos, que vive en África y Asia, es herbívoro, vive en manadas matriarcales y es reconocido por su inteligencia y compleja vida social. Existen dos especies principales, el elefante africano (más grande, con orejas tipo abanico y colmillos en machos y hembras) y el elefante asiático (más pequeño, con orejas redondeadas y solo algunos machos con colmillos), y se distinguen por su tamaño, forma de orejas y comportamiento.

JIRAFA
</td>
<td>
Las jirafas son los animales terrestres más altos del mundo, con una altura de hasta 5,5 metros (18 pies). Se identifican fácilmente por sus largos cuellos (que pueden extenderse hasta dos metros ) y su pelaje con manchas amarillas y marrones.
